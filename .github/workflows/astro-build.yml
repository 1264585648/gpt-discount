name: Astro Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: astro-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check Astro
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Audit published content
        run: npm run audit:build
